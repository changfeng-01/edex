problem_name: pia_ca_llso_transistor_level_goa
target_score: 80
parameter_columns:
  - M_pullup_W
  - M_pullup_L
  - M_pulldown_W
  - M_pulldown_L
  - M_reset_W
  - M_reset_L
  - M_bootstrap_W
  - M_bootstrap_L
  - C_load
  - C_boot
  - VDD
  - VSS
  - VGH
  - VGL
  - Vth_shift
  - CLK_rise_time
  - CLK_fall_time
metric_columns:
  - overall_score
  - delay_s
  - rise_time_s
  - fall_time_s
  - power_w
  - voh_min_v
  - constraint_violation
status_columns:
  status: status
score_columns:
  overall_score: overall_score
hard_constraint_columns:
  - hard_constraint_passed
forbidden_leakage_columns:
  - delay
  - delay_s
  - rise_time
  - rise_time_s
  - fall_time
  - fall_time_s
  - power
  - power_w
  - waveform_score
  - output_high
  - output_low
  - voh_min_v
  - overshoot
  - undershoot
  - holding_droop
  - total_score
  - overall_score
  - hard_constraint_passed
physics_features:
  profile: transistor_level
  electrical_features_enabled: true
electrical_model:
  model: tft_charge_sheet_v2
  units:
    geometry: um
    capacitance: pF
    time: ns
  devices:
    pullup:
      polarity: n
      width_column: M_pullup_W
      length_column: M_pullup_L
      mobility_column: mu_pullup_cm2_v_s
      cox_column: cox_f_per_cm2
      threshold_column: Vth_shift
      vgs_column: pullup_vgs_v
      vds_column: pullup_vds_v
      observed_resistance_column: pullup_observed_r_ohm
    pulldown:
      polarity: n
      width_column: M_pulldown_W
      length_column: M_pulldown_L
      mobility_column: mu_pulldown_cm2_v_s
      cox_column: cox_f_per_cm2
      threshold_column: Vth_shift
      vgs_column: pulldown_vgs_v
      vds_column: pulldown_vds_v
      observed_resistance_column: pulldown_observed_r_ohm
    bootstrap:
      polarity: n
      width_column: M_bootstrap_W
      length_column: M_bootstrap_L
      mobility_column: mu_bootstrap_cm2_v_s
      cox_column: cox_f_per_cm2
      threshold_column: Vth_shift
      vgs_column: bootstrap_vgs_v
      vds_column: bootstrap_vds_v
  bootstrap_solver:
    enabled: true
    target_role: pullup
    max_iterations: 25
    tolerance_v: 1.0e-9
    relaxation: 0.7
    gate_capacitance_f: 0.0
parasitics:
  summary_path_column: parasitic_summary_path
  net_role_map: {}
  legacy_capacitance_unit: pF
pvt:
  reference_temperature_c: 25.0
  reference_supply_v: 5.0
  mobility_temperature_exponent: 1.5
  vth_temperature_coefficient_v_per_c: 0.0
  supply_bias_exponent: 1.0
  sample_id_column: sample_id
  scenarios:
    - {corner: tt, temperature_c: 25.0, supply_v: 5.0}
  corner_models:
    tt: {mu_multiplier: 1.0, vth_shift_v: 0.0, resistance_multiplier: 1.0, capacitance_multiplier: 1.0}
feature_weights:
  pullup_overdrive_supply_ratio: 1.0
  pulldown_overdrive_supply_ratio: 1.0
  pullup_rc_to_clock_slew_ratio: 1.5
  pulldown_rc_to_clock_slew_ratio: 1.5
  bootstrap_coupling_factor_v3: 1.2
  bootstrap_headroom_supply_ratio: 1.2
  drive_balance_log_ratio: 1.0
capm_distance:
  metric_version: v3
  lambda_barrier: 1.0
  lambda_graph: 1.0
  lambda_missing: 1.0
  lambda_fallback: 0.25
  k_neighbors: 4
  normalization_enabled: true
  normalization_min_history_rows: 4
  normalization_floor_fraction: 0.05
  normalization_clip: 8.0
  coupling_enabled: false
  coupling_budget: 0.25
  barrier_enabled: true
  geodesic_enabled: true
  missing_penalty_enabled: true
  l1_aggregation: softmin
  l1_top_k: 3
  softmin_temperature: 0.25
  l1_quality_weight: 0.25
  min_vgh_vth_margin: 0.2
  min_vgl_off_margin: 0.2
  min_cboot_cload_ratio: 0.35
  max_ron_pullup_cload_proxy: 2.0
  max_ron_pulldown_cload_proxy: 2.0
  min_pullup_pulldown_ratio: 0.5
  max_pullup_pulldown_ratio: 2.0
  max_clk_slew_proxy: 2.0
  min_device_overdrive_v: 0.1
  max_critical_rc_delay_s: 1.0e-6
  min_bootstrap_coupling_factor_v3: 0.2
  min_bootstrap_headroom_v: 0.1
  max_abs_drive_balance_log_ratio: 2.0
  max_clock_slew_over_rc_ratio: 5.0
  pvt_worst_case_weight: 0.5
  pvt_cvar_quantile: 0.9
  pvt_cvar_weight: 0.5
  pvt_uncertainty_z: 1.0
  pvt_max_violation_probability: 0.0
  metric_covariance_shrinkage: 0.25
  metric_covariance_ridge: 1.0e-6
  historical_calibration_min_p90_count: 5
  couplings: []
  penalty_config:
    pullup_overdrive_v:
      type: exponential
      alpha: 2.0
    pulldown_overdrive_v:
      type: exponential
      alpha: 2.0
    critical_rc_delay_s:
      type: exponential
      alpha: 2.0
    bootstrap_coupling_factor_v3:
      type: exponential
      alpha: 2.0
    bootstrap_headroom_v:
      type: exponential
      alpha: 2.0
    clock_slew_over_rc_ratio:
      type: exponential
      alpha: 2.0
    drive_balance_log_ratio:
      type: quadratic
      alpha: 2.0
labeling:
  score_col: overall_score
  hard_pass_col: hard_constraint_passed
active_uncertainty_diversity:
  enabled: true
  weights:
    base_score: 0.45
    uncertainty: 0.25
    batch_diversity: 0.20
    hard_gate: 0.10
active_influence_on_demand:
  enabled: true
  influence_graph_enabled: true
  on_demand_constraint_enabled: true
  transfer_trust_enabled: true
  weights:
    active_base: 0.30
    influence_gain: 0.22
    constraint_urgency: 0.18
    uncertainty: 0.15
    transfer_trust: 0.10
    batch_diversity: 0.05
classifier_level_hybrid:
  enabled: true
  min_history_rows: 4
simulation_executor:
  mode: offline
  result_required_columns:
    - candidate_id
    - overall_score
    - hard_constraint_passed
    - delay_s
    - rise_time_s
    - fall_time_s
    - power_w
    - voh_min_v
metadata:
  circuit_profile: transistor_level_goa
  data_source: real_simulation_csv
  engineering_validity: simulation_only
  must_resimulate: true
