problem_name: pia_ca_llso_goa_profile
target_score: 80
parameter_columns:
  - TFT_pullup_W
  - TFT_pullup_L
  - TFT_pulldown_W
  - TFT_pulldown_L
  - TFT_reset_W
  - TFT_reset_L
  - TFT_bootstrap_W
  - TFT_bootstrap_L
  - C_boot
  - C_load
  - CLK_amp
  - CLK_rise_time
  - CLK_fall_time
  - VGH
  - VGL
  - Vth_shift
metric_columns:
  - overall_score
  - delay
  - power
status_columns:
  status: status
score_columns:
  overall_score: overall_score
hard_constraint_columns:
  - hard_constraint_passed
forbidden_leakage_columns:
  - delay
  - rise_time
  - fall_time
  - power
  - waveform_score
  - output_high
  - output_low
  - overshoot
  - undershoot
  - holding_droop
  - total_score
  - overall_score
  - hard_constraint_passed
physics_features:
  profile: goa
  electrical_features_enabled: true
feature_weights:
  cboot_cload_ratio: 2.0
  pullup_pulldown_ratio: 2.0
  ron_pullup_cload_proxy: 1.5
  ron_pulldown_cload_proxy: 1.5
  vgh_vth_margin: 1.5
  vgl_off_margin: 1.5
  clk_slew_proxy: 1.2
capm_distance:
  metric_version: v2
  lambda_barrier: 1.0
  lambda_graph: 1.0
  lambda_missing: 1.0
  lambda_fallback: 0.25
  k_neighbors: 4
  normalization_enabled: true
  normalization_min_history_rows: 4
  normalization_floor_fraction: 0.05
  normalization_clip: 8.0
  coupling_enabled: true
  coupling_budget: 0.25
  barrier_enabled: true
  geodesic_enabled: true
  missing_penalty_enabled: true
  l1_aggregation: softmin
  l1_top_k: 3
  softmin_temperature: 0.25
  l1_quality_weight: 0.25
  min_vgh_vth_margin: 0.2
  min_vgl_off_margin: 0.2
  min_cboot_cload_ratio: 0.35
  max_ron_pullup_cload_proxy: 2.0
  max_ron_pulldown_cload_proxy: 2.0
  min_pullup_pulldown_ratio: 0.5
  max_pullup_pulldown_ratio: 2.0
  max_clk_slew_proxy: 2.0
  couplings:
    - {left: ron_pullup_cload_proxy, right: clk_slew_proxy, weight: 0.25, enabled: true}
    - {left: ron_pulldown_cload_proxy, right: clk_slew_proxy, weight: 0.25, enabled: true}
    - {left: cboot_cload_ratio, right: vgh_vth_margin, weight: 0.25, enabled: true}
    - {left: ron_pullup_cload_proxy, right: vgh_vth_margin, weight: 0.15, enabled: true}
    - {left: ron_pulldown_cload_proxy, right: vgl_off_margin, weight: 0.15, enabled: true}
    - {left: cboot_cload_ratio, right: holding_droop_proxy, weight: 0.15, enabled: true}
    - {left: pullup_pulldown_ratio, right: clk_slew_proxy, weight: 0.10, enabled: true}
    - {left: vgh_vth_margin, right: vgl_off_margin, weight: 0.10, enabled: true}
  penalty_config:
    vgh_vth_margin:
      type: exponential
      alpha: 2.0
    vgl_off_margin:
      type: exponential
      alpha: 2.0
    cboot_cload_ratio:
      type: exponential
      alpha: 2.0
    ron_pullup_cload_proxy:
      type: exponential
      alpha: 2.0
    ron_pulldown_cload_proxy:
      type: exponential
      alpha: 2.0
    clk_slew_proxy:
      type: exponential
      alpha: 2.0
    pullup_pulldown_ratio:
      type: quadratic
      alpha: 2.0
labeling:
  score_col: overall_score
  hard_pass_col: hard_constraint_passed
acquisition_weights:
  p_l1: 0.30
  predicted_score: 0.20
  p_hard_pass: 0.20
  uncertainty: 0.10
  attention_l1_mass: 0.10
  distance: 0.05
  diversity: 0.05
adaptive_capm:
  enabled: true
  min_history_rows: 4
classifier_level_hybrid:
  enabled: true
  min_history_rows: 4
active_uncertainty_diversity:
  enabled: true
  weights:
    base_score: 0.45
    uncertainty: 0.25
    batch_diversity: 0.20
    hard_gate: 0.10
active_influence_on_demand:
  enabled: true
  influence_graph_enabled: true
  on_demand_constraint_enabled: true
  transfer_trust_enabled: true
  weights:
    active_base: 0.30
    influence_gain: 0.22
    constraint_urgency: 0.18
    uncertainty: 0.15
    transfer_trust: 0.10
    batch_diversity: 0.05
literature_ensemble_hybrid:
  enabled: true
  hrcea_alpha_cut: 0.65
  cesaea_relaxation_margin: 0.10
  weights:
    deaoe: 0.22
    hrcea: 0.22
    aiea: 0.18
    cesaea: 0.20
    eccoea_asaa: 0.18
evaluation_scheduler:
  enabled: true
  full_frame_top_k: 1
repair_candidates:
  enabled: true
  max_repair_candidates: 4
  step_fraction: 0.10
benchmark:
  strategies:
    - random
    - ca_llso_raw_distance
    - pia_physics_distance
    - pia_capm_distance
    - adaptive_pia_capm
    - classifier_level_hybrid
    - active_uncertainty_diversity
    - active_influence_on_demand
    - literature_ensemble_hybrid
metadata:
  data_source: real_simulation_csv
  engineering_validity: simulation_only
