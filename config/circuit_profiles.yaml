schema_version: "1.0"

profiles:
  default:
    aliases: []
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
      must_resimulate: true
    metrics: {}

  goa_8k_lcd_reference:
    type: "goa_shift_register"
    aliases:
      - goa_8k
      - goa_8k_lcd
      - goa_8t1c_720
      - goa_reference
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
      must_resimulate: true
    reference:
      source: "literature_reference"
      note: "Lei Tengteng thesis 8K LCD GOA reference values; not reproduced by this repository."
      load:
        rl_ohm: 7200.0
        cl_f: 728.0e-12
      timing:
        tfall_s: 0.97e-6
        trise_s: 1.93e-6
      baselines:
        proposed_goa:
          structure: "16T2C"
          tfall_s: 0.97e-6
          power_total_w: 0.10
          delta_vth_margin_v: 4.0
        sharp_like_goa:
          structure: "11T1C"
          tfall_s: 1.52e-6
          power_total_w: 0.04
          delta_vth_margin_v: 3.0
        samsung_like_goa:
          structure: "15T1C"
          tfall_s: 1.69e-6
          power_total_w: 0.23
          delta_vth_margin_v: 4.0
    metrics:
      fall_time_s:
        source: goa_benchmark_metrics
        unit: s
        maximum: 0.97e-6
        direction: smaller_better
      rise_time_s:
        source: goa_benchmark_metrics
        unit: s
        maximum: 1.93e-6
        direction: smaller_better
      false_trigger_count:
        source: goa_benchmark_metrics
        unit: count
        maximum: 0
        direction: smaller_better
      max_overlap_ratio:
        source: goa_benchmark_metrics
        unit: ratio
        maximum: 0.10
        direction: smaller_better
      voh_min_v:
        source: goa_benchmark_metrics
        unit: V
        minimum: 5.0
        direction: larger_better
      power_total_w:
        source: goa_benchmark_metrics
        unit: W
        maximum: 0.10
        direction: smaller_better
      power_static_w:
        source: goa_benchmark_metrics
        unit: W
        direction: smaller_better
      power_dynamic_w:
        source: goa_benchmark_metrics
        unit: W
        direction: smaller_better
      area_proxy:
        source: goa_benchmark_metrics
        direction: smaller_better
      width_proxy:
        source: goa_benchmark_metrics
        direction: smaller_better
      delta_vth_margin_v:
        source: goa_benchmark_metrics
        unit: V
        minimum: 4.0
        direction: larger_better
    objective:
      scalarization:
        method: weighted_sum
        missing_metric_policy: not_evaluable
      weights:
        fall_time_s: 0.25
        rise_time_s: 0.10
        false_trigger_count: 0.20
        max_overlap_ratio: 0.15
        voh_min_v: 0.10
        power_total_w: 0.10
        area_proxy: 0.05
        delta_vth_margin_v: 0.05

  transistor_level_goa:
    type: "transistor_level_goa_shift_register"
    aliases:
      - transistor_goa
      - tft_goa_transistor_level
      - pia_transistor_level
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
      must_resimulate: true
    reference:
      source: "local_fixture_contract"
      note: "Template and CSV fixture define the next-run simulation interface only; external simulation results remain required."
    parameter_profile:
      parameters:
        pullup_width: {column: M_pullup_W, role: pullup, property: width, kind: design, unit: um, optimizable: true, mapping_fidelity: exact}
        pullup_length: {column: M_pullup_L, role: pullup, property: length, kind: design, unit: um, optimizable: true, mapping_fidelity: exact}
        pulldown_width: {column: M_pulldown_W, role: pulldown, property: width, kind: design, unit: um, optimizable: true, mapping_fidelity: exact}
        pulldown_length: {column: M_pulldown_L, role: pulldown, property: length, kind: design, unit: um, optimizable: true, mapping_fidelity: exact}
        reset_width: {column: M_reset_W, role: reset, property: width, kind: design, unit: um, optimizable: true, mapping_fidelity: exact}
        reset_length: {column: M_reset_L, role: reset, property: length, kind: design, unit: um, optimizable: true, mapping_fidelity: exact}
        bootstrap_width: {column: M_bootstrap_W, role: bootstrap, property: width, kind: design, unit: um, optimizable: true, mapping_fidelity: exact}
        bootstrap_length: {column: M_bootstrap_L, role: bootstrap, property: length, kind: design, unit: um, optimizable: true, mapping_fidelity: exact}
        bootstrap_capacitance: {column: C_boot, role: bootstrap, property: capacitance, kind: design, unit: pF, optimizable: true, mapping_fidelity: exact}
        load_capacitance: {column: C_load, role: output_load, property: capacitance, kind: environment, unit: pF, optimizable: false, mapping_fidelity: exact}
        positive_supply: {column: VDD, role: supply, property: positive_voltage, kind: environment, unit: V, optimizable: false, mapping_fidelity: exact}
        negative_supply: {column: VSS, role: supply, property: negative_voltage, kind: environment, unit: V, optimizable: false, mapping_fidelity: exact}
        clock_rise_time: {column: CLK_rise_time, role: clock, property: rise_time, kind: environment, unit: ns, optimizable: false, mapping_fidelity: exact}
        clock_fall_time: {column: CLK_fall_time, role: clock, property: fall_time, kind: environment, unit: ns, optimizable: false, mapping_fidelity: exact}
    required_analyses:
      - tran
    metrics:
      delay_s:
        source: transistor_level_simulation_results
        unit: s
        maximum: 2.0e-6
        direction: smaller_better
      rise_time_s:
        source: transistor_level_simulation_results
        unit: s
        maximum: 2.0e-6
        direction: smaller_better
      fall_time_s:
        source: transistor_level_simulation_results
        unit: s
        maximum: 1.5e-6
        direction: smaller_better
      power_w:
        source: transistor_level_simulation_results
        unit: W
        maximum: 0.10
        direction: smaller_better
      voh_min_v:
        source: transistor_level_simulation_results
        unit: V
        minimum: 10.0
        direction: larger_better
      constraint_violation:
        source: transistor_level_simulation_results
        maximum: 0.10
        direction: smaller_better
    hard_constraints:
      delay_s:
        maximum: 2.0e-6
      rise_time_s:
        maximum: 2.0e-6
      fall_time_s:
        maximum: 1.5e-6
      voh_min_v:
        minimum: 10.0
      constraint_violation:
        maximum: 0.10
    objective:
      scalarization:
        method: weighted_sum
        missing_metric_policy: not_evaluable
      weights:
        delay_s: 0.20
        rise_time_s: 0.15
        fall_time_s: 0.15
        power_w: 0.15
        voh_min_v: 0.20
        constraint_violation: 0.15

  instrumentation_amplifier_three_opamp_compensated_v1:
    type: "instrumentation_amplifier"
    aliases:
      - three_opamp_7r
      - instrumentation_amplifier
      - three_opamp_lm324
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
      must_resimulate: true
    reference:
      source: "analytic_template"
      note: "LM324 names only an external model or CSV identity; analytic proxy results do not claim device-level LM324 accuracy."
    physics_version: "instrumentation_amplifier_three_opamp_v1"
    task_head_version: "instrumentation_amplifier_task_v1"
    objectives:
      required_inputs:
        - target_differential_gain
    parameter_profile:
      parameters:
        first_stage_resistance: {column: R, role: first_stage, property: resistance, kind: design, unit: ohm, optimizable: true, bounds: [5.0e3, 50.0e3], mapping_fidelity: exact}
        gain_resistance: {column: RG, role: gain, property: resistance, kind: design, unit: ohm, optimizable: true, bounds: [0.5e3, 20.0e3], mapping_fidelity: exact}
        differential_resistance: {column: RD, role: difference_stage, property: resistance, kind: design, unit: ohm, optimizable: true, bounds: [5.0e3, 50.0e3], mapping_fidelity: exact}
        positive_ratio: {column: KD_plus, role: difference_stage_positive, property: resistance_ratio, kind: design, unit: ratio, optimizable: true, bounds: [0.8, 2.0], mapping_fidelity: exact}
        negative_ratio: {column: KD_minus, role: difference_stage_negative, property: resistance_ratio, kind: design, unit: ratio, optimizable: true, bounds: [0.8, 2.0], mapping_fidelity: exact}
        compensation_capacitance: {column: CF, role: compensation, property: capacitance, kind: design, unit: F, optimizable: true, bounds: [1.0e-12, 1.0e-9], mapping_fidelity: exact}
        differential_input: {column: Vd, role: input, property: differential_voltage, kind: environment, unit: V, optimizable: false, mapping_fidelity: exact}
        common_mode_input: {column: V_CM, role: input, property: common_mode_voltage, kind: environment, unit: V, optimizable: false, mapping_fidelity: exact}
        input_frequency: {column: f, role: input, property: frequency, kind: environment, unit: Hz, optimizable: false, mapping_fidelity: exact}
        positive_supply: {column: VCC, role: supply, property: positive_voltage, kind: environment, unit: V, optimizable: false, mapping_fidelity: exact}
        negative_supply: {column: VEE, role: supply, property: negative_voltage, kind: environment, unit: V, optimizable: false, mapping_fidelity: exact}
        output_load: {column: RL, role: load, property: resistance, kind: environment, unit: ohm, optimizable: false, mapping_fidelity: exact}
        temperature: {column: temperature_c, role: environment, property: temperature_c, kind: environment, unit: degC, optimizable: false, mapping_fidelity: exact}
        corner: {column: corner, role: environment, property: corner, kind: environment, optimizable: false, mapping_fidelity: exact}
        open_loop_gain: {column: A0, role: opamp_model, property: open_loop_gain, kind: model, unit: ratio, optimizable: false, mapping_fidelity: exact}
        gain_bandwidth: {column: GBW, role: opamp_model, property: gain_bandwidth, kind: model, unit: Hz, optimizable: false, mapping_fidelity: exact}
        slew_rate: {column: SR, role: opamp_model, property: slew_rate, kind: model, unit: V/s, optimizable: false, mapping_fidelity: exact}
        output_resistance: {column: Rout, role: opamp_model, property: output_resistance, kind: model, unit: ohm, optimizable: false, mapping_fidelity: exact}
        input_offset: {column: input_offset_v, role: opamp_model, property: input_offset, kind: model, unit: V, optimizable: false, mapping_fidelity: exact}
        input_bias_current: {column: input_bias_current_a, role: opamp_model, property: input_bias_current, kind: model, unit: A, optimizable: false, mapping_fidelity: exact}
        input_common_min: {column: input_common_min_v, role: opamp_model, property: input_common_min, kind: model, unit: V, optimizable: false, mapping_fidelity: exact}
        input_common_max: {column: input_common_max_v, role: opamp_model, property: input_common_max, kind: model, unit: V, optimizable: false, mapping_fidelity: exact}
        output_low: {column: output_low_v, role: opamp_model, property: output_low, kind: model, unit: V, optimizable: false, mapping_fidelity: exact}
        output_high: {column: output_high_v, role: opamp_model, property: output_high, kind: model, unit: V, optimizable: false, mapping_fidelity: exact}
        supply_current: {column: supply_current_a, role: opamp_model, property: supply_current, kind: model, unit: A, optimizable: false, mapping_fidelity: exact}
        resistor_variation_1: {column: delta1, role: resistor_1, property: relative_error, kind: variation, unit: ratio, optimizable: false, mapping_fidelity: exact}
        resistor_variation_2: {column: delta2, role: resistor_2, property: relative_error, kind: variation, unit: ratio, optimizable: false, mapping_fidelity: exact}
        resistor_variation_3: {column: delta3, role: resistor_3, property: relative_error, kind: variation, unit: ratio, optimizable: false, mapping_fidelity: exact}
        resistor_variation_4: {column: delta4, role: resistor_4, property: relative_error, kind: variation, unit: ratio, optimizable: false, mapping_fidelity: exact}
        resistor_variation_5: {column: delta5, role: resistor_5, property: relative_error, kind: variation, unit: ratio, optimizable: false, mapping_fidelity: exact}
        resistor_variation_6: {column: delta6, role: resistor_6, property: relative_error, kind: variation, unit: ratio, optimizable: false, mapping_fidelity: exact}
    required_analyses: [op, ac, tran]
    metrics:
      gain_error_fraction: {source: ac_metrics, source_analysis: ac, unit: ratio, maximum: 0.01, direction: smaller_better, required: true}
      cmrr_db: {source: ac_metrics, source_analysis: ac, unit: dB, minimum: 60.0, direction: larger_better, required: true}
      bandwidth_hz: {source: ac_metrics, source_analysis: ac, unit: Hz, minimum: 10000.0, direction: larger_better, required: true}
      output_headroom_v: {source: op_metrics, source_analysis: op, unit: V, minimum: 1.5, direction: larger_better, required: true}
      slew_utilization: {source: tran_metrics, source_analysis: tran, unit: ratio, maximum: 1.0, direction: smaller_better, required: true}
      power_w: {source: op_metrics, source_analysis: op, unit: W, direction: smaller_better, required: false}
    hard_constraints:
      gain_error_fraction: {maximum: 0.01}
      cmrr_db: {minimum: 60.0}
      bandwidth_hz: {minimum: 10.0e3}
      output_headroom_v: {minimum: 1.5}
      slew_utilization: {maximum: 1.0}
    objective:
      scalarization: {method: weighted_sum, missing_metric_policy: not_evaluable}
      weights:
        gain_error_fraction: 0.25
        cmrr_db: 0.25
        bandwidth_hz: 0.15
        output_headroom_v: 0.15
        slew_utilization: 0.10
        power_w: 0.10
    historical_calibration:
      namespace_fields: [agent, profile, physics_version, task_head_version, corner_set]

  ota_general:
    type: "analog_amplifier"
    aliases:
      - ota
      - opamp
      - two_stage_opamp
      - amplifier
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
      must_resimulate: true
    parameter_profile:
      parameters:
        input_pair_m1_width: {column: m1_width, role: input_pair, property: width, kind: design, unit: um, optimizable: true, group: input_pair, mapping_fidelity: exact}
        input_pair_m2_width: {column: m2_width, role: input_pair, property: width, kind: design, unit: um, optimizable: true, group: input_pair, mapping_fidelity: exact}
        bias_current: {column: ibias, role: bias, property: current, kind: design, unit: A, optimizable: true, mapping_fidelity: exact}
        compensation_capacitance: {column: ccomp, role: compensation, property: capacitance, kind: design, unit: F, optimizable: true, mapping_fidelity: exact}
      parameter_groups:
        input_pair:
          constraint: keep_ratio
    required_analyses:
      - op
      - ac
      - tran
    optional_analyses:
      - dc
    metrics:
      dc_gain_db:
        source: ac_metrics
        source_analysis: ac
        unit: dB
        minimum: 60dB
        direction: larger_better
      unity_gain_hz:
        source: ac_metrics
        source_analysis: ac
        unit: Hz
        minimum: 20MHz
        direction: larger_better
      phase_margin_deg:
        source: ac_metrics
        source_analysis: ac
        unit: deg
        minimum: 55deg
        direction: target_or_larger
      static_power_w:
        source: op_metrics
        source_analysis: op
        unit: W
        maximum: 5mW
        direction: smaller_better
      slew_rate_v_per_s:
        source: tran_metrics
        source_analysis: tran
        unit: V/s
        minimum: 10000000.0
        direction: larger_better
    hard_constraints:
      phase_margin_deg:
        minimum: 55deg
      static_power_w:
        maximum: 5mW
    objective:
      scalarization:
        method: weighted_sum
        missing_metric_policy: not_evaluable
      weights:
        dc_gain_db: 0.25
        unity_gain_hz: 0.20
        phase_margin_deg: 0.15
        static_power_w: 0.20
        slew_rate_v_per_s: 0.20
    candidate_rules:
      dc_gain_db:
        - semantic_tags:
            - input_pair_width
            - gain_device_width
            - gm_control
          direction: increase
          priority: 92
          rationale: "Increase effective transconductance or gain-device dimensions for gain recovery."
      unity_gain_hz:
        - semantic_tags:
            - bias_current
            - speed_power_tradeoff
          direction: increase
          priority: 88
          rationale: "Increasing bias current may improve bandwidth but increases static power."
      static_power_w:
        - semantic_tags:
            - bias_current
          direction: decrease
          priority: 96
          rationale: "Reduce bias current when static power dominates."
      phase_margin_deg:
        - semantic_tags:
            - compensation_capacitance
          direction: increase
          priority: 85
          rationale: "Increasing compensation capacitance may improve phase margin but reduce bandwidth."

  ota_general_v2:
    type: "analog_amplifier"
    aliases:
      - ota_v2
      - opamp_v2
      - two_stage_opamp_v2
      - amplifier_v2
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
      must_resimulate: true
    required_analyses:
      - op
      - ac
      - tran
    optional_analyses:
      - dc
    node_rules:
      input:
        - "v(in)"
      output:
        - "v(out)"
    metrics:
      dc_gain_db:
        source: ac_metrics
        source_analysis: ac
        unit: dB
        minimum: 60dB
        direction: larger_better
      unity_gain_hz:
        source: ac_metrics
        source_analysis: ac
        unit: Hz
        minimum: 20MHz
        direction: larger_better
      bandwidth_3db_hz:
        source: ac_metrics
        source_analysis: ac
        unit: Hz
        minimum: 1MHz
        direction: larger_better
      static_power_w:
        source: op_metrics
        source_analysis: op
        unit: W
        maximum: 5mW
        direction: smaller_better
      slew_rate_v_per_s:
        source: tran_metrics
        source_analysis: tran
        unit: V/s
        minimum: 10000000.0
        direction: larger_better
      output_swing_v:
        source: tran_metrics
        source_analysis: tran
        unit: V
        minimum: 1.0
        direction: larger_better
    hard_constraints:
      dc_gain_db:
        minimum: 60dB
      static_power_w:
        maximum: 5mW
    objective:
      scalarization:
        method: weighted_sum
        missing_metric_policy: not_evaluable
      weights:
        dc_gain_db: 0.20
        unity_gain_hz: 0.20
        bandwidth_3db_hz: 0.15
        static_power_w: 0.20
        slew_rate_v_per_s: 0.15
        output_swing_v: 0.10
    candidate_rules:
      dc_gain_db:
        - semantic_tags:
            - input_pair_width
            - gain_device_width
            - gm_control
          direction: increase
          priority: 92
          rationale: "Increase effective transconductance or gain-device dimensions for gain recovery."
      unity_gain_hz:
        - semantic_tags:
            - bias_current
            - speed_power_tradeoff
          direction: increase
          priority: 88
          rationale: "Increasing bias current may improve bandwidth but increases static power."
      static_power_w:
        - semantic_tags:
            - bias_current
          direction: decrease
          priority: 96
          rationale: "Reduce bias current when static power dominates."
      bandwidth_3db_hz:
        - semantic_tags:
            - compensation_capacitance
            - speed_power_tradeoff
          direction: review_tradeoff
          priority: 85
          rationale: "Review compensation and bias trade-offs when measured bandwidth is insufficient."

  comparator_general:
    type: "analog_comparator"
    aliases:
      - comparator
      - voltage_comparator
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
      must_resimulate: true
    required_analyses:
      - op
      - dc
    optional_analyses:
      - tran
    node_rules:
      input:
        - "input_v"
      output:
        - "output_v"
    metrics:
      switching_threshold_v:
        source: dc_metrics
        source_analysis: dc
        unit: V
        target: 0.9V
        tolerance: 0.1V
        direction: target
      output_swing_v:
        source: dc_metrics
        source_analysis: dc
        unit: V
        minimum: 1.6V
        direction: larger_better
      static_power_w:
        source: op_metrics
        source_analysis: op
        unit: W
        maximum: 1mW
        direction: smaller_better
    hard_constraints:
      output_swing_v:
        minimum: 1.6V
      static_power_w:
        maximum: 1mW
    objective:
      scalarization:
        method: weighted_sum
        missing_metric_policy: not_evaluable
      weights:
        switching_threshold_v: 0.35
        output_swing_v: 0.35
        static_power_w: 0.30

  oscillator_general:
    type: "ring_oscillator"
    aliases:
      - oscillator
      - ring_oscillator
      - ring_osc
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
      must_resimulate: true
    required_analyses:
      - op
      - tran
    node_rules:
      output:
        - "v(out)"
    metrics:
      frequency_hz:
        source: tran_metrics
        source_analysis: tran
        unit: Hz
        minimum: 100kHz
        direction: larger_better
      period_std_s:
        source: tran_metrics
        source_analysis: tran
        unit: s
        maximum: 100ns
        direction: smaller_better
      startup_time_s:
        source: tran_metrics
        source_analysis: tran
        unit: s
        maximum: 10us
        direction: smaller_better
      output_swing_v:
        source: tran_metrics
        source_analysis: tran
        unit: V
        minimum: 1.6V
        direction: larger_better
      static_power_w:
        source: op_metrics
        source_analysis: op
        unit: W
        maximum: 2mW
        direction: smaller_better
    hard_constraints:
      frequency_hz:
        minimum: 100kHz
      output_swing_v:
        minimum: 1.6V
      static_power_w:
        maximum: 2mW
    objective:
      scalarization:
        method: weighted_sum
        missing_metric_policy: not_evaluable
      weights:
        frequency_hz: 0.30
        period_std_s: 0.15
        startup_time_s: 0.15
        output_swing_v: 0.20
        static_power_w: 0.20
