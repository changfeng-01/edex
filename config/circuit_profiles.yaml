schema_version: "1.0"

profiles:
  default:
    aliases: []
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
    metrics: {}

  goa_8k_lcd_reference:
    type: "goa_shift_register"
    aliases:
      - goa_8k
      - goa_8k_lcd
      - goa_8t1c_720
      - goa_reference
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
    reference:
      source: "literature_reference"
      note: "Lei Tengteng thesis 8K LCD GOA reference values; not reproduced by this repository."
      load:
        rl_ohm: 7200.0
        cl_f: 728.0e-12
      timing:
        tfall_s: 0.97e-6
        trise_s: 1.93e-6
      baselines:
        proposed_goa:
          structure: "16T2C"
          tfall_s: 0.97e-6
          power_total_w: 0.10
          delta_vth_margin_v: 4.0
        sharp_like_goa:
          structure: "11T1C"
          tfall_s: 1.52e-6
          power_total_w: 0.04
          delta_vth_margin_v: 3.0
        samsung_like_goa:
          structure: "15T1C"
          tfall_s: 1.69e-6
          power_total_w: 0.23
          delta_vth_margin_v: 4.0
    metrics:
      fall_time_s:
        source: goa_benchmark_metrics
        unit: s
        maximum: 0.97e-6
        direction: smaller_better
      rise_time_s:
        source: goa_benchmark_metrics
        unit: s
        maximum: 1.93e-6
        direction: smaller_better
      false_trigger_count:
        source: goa_benchmark_metrics
        unit: count
        maximum: 0
        direction: smaller_better
      max_overlap_ratio:
        source: goa_benchmark_metrics
        unit: ratio
        maximum: 0.10
        direction: smaller_better
      voh_min_v:
        source: goa_benchmark_metrics
        unit: V
        minimum: 5.0
        direction: larger_better
      power_total_w:
        source: goa_benchmark_metrics
        unit: W
        maximum: 0.10
        direction: smaller_better
      power_static_w:
        source: goa_benchmark_metrics
        unit: W
        direction: smaller_better
      power_dynamic_w:
        source: goa_benchmark_metrics
        unit: W
        direction: smaller_better
      area_proxy:
        source: goa_benchmark_metrics
        direction: smaller_better
      width_proxy:
        source: goa_benchmark_metrics
        direction: smaller_better
      delta_vth_margin_v:
        source: goa_benchmark_metrics
        unit: V
        minimum: 4.0
        direction: larger_better
    objective:
      scalarization:
        method: weighted_sum
        missing_metric_policy: not_evaluable
      weights:
        fall_time_s: 0.25
        rise_time_s: 0.10
        false_trigger_count: 0.20
        max_overlap_ratio: 0.15
        voh_min_v: 0.10
        power_total_w: 0.10
        area_proxy: 0.05
        delta_vth_margin_v: 0.05

  transistor_level_goa:
    type: "transistor_level_goa_shift_register"
    aliases:
      - transistor_goa
      - tft_goa_transistor_level
      - pia_transistor_level
    boundary:
      data_source: "real_simulation_csv"
      engineering_validity: "simulation_only"
      must_resimulate: true
    reference:
      source: "local_fixture_contract"
      note: "Template and CSV fixture define the next-run simulation interface only; external simulation results remain required."
    required_analyses:
      - tran
    metrics:
      delay_s:
        source: transistor_level_simulation_results
        unit: s
        maximum: 2.0e-6
        direction: smaller_better
      rise_time_s:
        source: transistor_level_simulation_results
        unit: s
        maximum: 2.0e-6
        direction: smaller_better
      fall_time_s:
        source: transistor_level_simulation_results
        unit: s
        maximum: 1.5e-6
        direction: smaller_better
      power_w:
        source: transistor_level_simulation_results
        unit: W
        maximum: 0.10
        direction: smaller_better
      voh_min_v:
        source: transistor_level_simulation_results
        unit: V
        minimum: 10.0
        direction: larger_better
      constraint_violation:
        source: transistor_level_simulation_results
        maximum: 0.10
        direction: smaller_better
    hard_constraints:
      delay_s:
        maximum: 2.0e-6
      rise_time_s:
        maximum: 2.0e-6
      fall_time_s:
        maximum: 1.5e-6
      voh_min_v:
        minimum: 10.0
      constraint_violation:
        maximum: 0.10
    objective:
      scalarization:
        method: weighted_sum
        missing_metric_policy: not_evaluable
      weights:
        delay_s: 0.20
        rise_time_s: 0.15
        fall_time_s: 0.15
        power_w: 0.15
        voh_min_v: 0.20
        constraint_violation: 0.15

  ota_general:
    type: "analog_amplifier"
    aliases:
      - ota
      - opamp
      - two_stage_opamp
      - amplifier
    boundary:
      data_source: "real_simulation_artifacts"
      engineering_validity: "simulation_only"
    required_analyses:
      - op
      - ac
      - tran
    optional_analyses:
      - dc
      - noise
    metrics:
      dc_gain_db:
        source: ac_metrics
        source_analysis: ac
        unit: dB
        minimum: 60dB
        direction: larger_better
      unity_gain_hz:
        source: ac_metrics
        source_analysis: ac
        unit: Hz
        minimum: 20MHz
        direction: larger_better
      phase_margin_deg:
        source: ac_metrics
        source_analysis: ac
        unit: deg
        minimum: 55deg
        direction: target_or_larger
      static_power_w:
        source: op_metrics
        source_analysis: op
        unit: W
        maximum: 5mW
        direction: smaller_better
      slew_rate_v_per_s:
        source: tran_metrics
        source_analysis: tran
        unit: V/s
        minimum: 10000000.0
        direction: larger_better
    hard_constraints:
      phase_margin_deg:
        minimum: 55deg
      static_power_w:
        maximum: 5mW
    objective:
      scalarization:
        method: weighted_sum
        missing_metric_policy: not_evaluable
      weights:
        dc_gain_db: 0.25
        unity_gain_hz: 0.20
        phase_margin_deg: 0.15
        static_power_w: 0.20
        slew_rate_v_per_s: 0.20
    candidate_rules:
      dc_gain_db:
        - semantic_tags:
            - input_pair_width
            - gain_device_width
            - gm_control
          direction: increase
          priority: 92
          rationale: "Increase effective transconductance or gain-device dimensions for gain recovery."
      unity_gain_hz:
        - semantic_tags:
            - bias_current
            - speed_power_tradeoff
          direction: increase
          priority: 88
          rationale: "Increasing bias current may improve bandwidth but increases static power."
      static_power_w:
        - semantic_tags:
            - bias_current
          direction: decrease
          priority: 96
          rationale: "Reduce bias current when static power dominates."
      phase_margin_deg:
        - semantic_tags:
            - compensation_capacitance
          direction: increase
          priority: 85
          rationale: "Increasing compensation capacitance may improve phase margin but reduce bandwidth."
